name: Release desktop apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Test
        run: npm test

      - name: Check tag matches package version
        shell: bash
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $expected_tag"
            exit 1
          fi

  windows:
    name: Signed Windows build
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Require Windows signing credentials
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            Write-Error "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD repository secrets are required."
          }

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build signed installers
        run: npm run dist -- --win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

  macos:
    name: Signed and notarized macOS build
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Require Apple signing and notarization credentials
        shell: bash
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID)
          for variable in "${required[@]}"; do
            if [[ -z "${!variable}" ]]; then
              echo "::error::$variable is not configured. See README release instructions."
              exit 1
            fi
          done

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Build, sign, and notarize
        run: npm run dist -- --mac

      - name: Verify Gatekeeper acceptance
        shell: bash
        run: spctl --assess --type open --context context:primary-signature --verbose dist/*.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Acro dB Meter $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
