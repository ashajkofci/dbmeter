name: Release desktop apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from package.json (for example: 1.1.0)"
        required: true
        type: string
      signed:
        description: "Require trusted Windows signing and Apple signing/notarization"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
  SIGNED_RELEASE: ${{ github.event_name != 'workflow_dispatch' || inputs.signed }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Apply manually selected version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: npm version "${RELEASE_TAG#v}" --no-git-tag-version --allow-same-version

      - name: Install locked dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Validate release version and source
        shell: bash
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "::error::Release version $RELEASE_TAG is not a valid npm version."
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Manual releases must be run from the main branch."
            exit 1
          fi

  windows:
    name: Signed Windows build
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release-signing
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ (github.event_name != 'workflow_dispatch' || inputs.signed) && 'true' || 'false' }}

    steps:
      - name: Require Windows signing credentials
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD environment secrets are required."
          }

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Apply manually selected version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: npm version "${RELEASE_TAG#v}" --no-git-tag-version --allow-same-version

      - name: Install locked dependencies
        run: npm ci

      - name: Build signed installers
        if: env.SIGNED_RELEASE == 'true'
        run: npm run dist -- --win

      - name: Build unsigned Windows packages
        if: env.SIGNED_RELEASE != 'true'
        shell: pwsh
        run: |
          Remove-Item Env:CSC_LINK -ErrorAction SilentlyContinue
          Remove-Item Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue
          $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          npm run dist -- --win --config.win.signExecutable=false
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify Authenticode signatures
        if: env.SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          $targets = @(
            Get-ChildItem -Path dist -File -Filter *.exe
            Get-Item -Path "dist/win-unpacked/Acro dB Meter.exe"
          )
          if ($targets.Count -lt 2) {
            throw "Expected the signed app and installer."
          }
          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature -FilePath $target.FullName
            if ($signature.Status -ne "Valid") {
              throw "Invalid signature on $($target.Name): $($signature.Status)"
            }
            Write-Host "$($target.Name) is signed by $($signature.SignerCertificate.Subject)"
          }

      - name: Mark unsigned Windows artifacts
        if: env.SIGNED_RELEASE != 'true'
        shell: pwsh
        run: |
          Get-ChildItem -Path "dist/*.exe" | ForEach-Object {
            Rename-Item -Path $_.FullName -NewName "$($_.BaseName)-UNSIGNED$($_.Extension)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS ${{ matrix.arch }}
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 45
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ (github.event_name != 'workflow_dispatch' || inputs.signed) && 'true' || 'false' }}

    steps:
      - name: Require Apple signing and notarization credentials
        if: env.SIGNED_RELEASE == 'true'
        shell: bash
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID)
          for variable in "${required[@]}"; do
            if [[ -z "${!variable}" ]]; then
              echo "::error::$variable is not configured. See README release instructions."
              exit 1
            fi
          done

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Apply manually selected version
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: npm version "${RELEASE_TAG#v}" --no-git-tag-version --allow-same-version

      - name: Install locked dependencies
        run: npm ci

      - name: Build, sign, and notarize
        if: env.SIGNED_RELEASE == 'true'
        run: npm run dist -- --mac --${{ matrix.arch }}

      - name: Build unsigned packages
        if: env.SIGNED_RELEASE != 'true'
        shell: bash
        run: |
          unset CSC_LINK
          unset CSC_KEY_PASSWORD
          unset APPLE_ID
          unset APPLE_APP_SPECIFIC_PASSWORD
          unset APPLE_TEAM_ID
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          npm run dist -- --mac --${{ matrix.arch }} --config.mac.notarize=false

      - name: Verify signatures, notarization, and Gatekeeper acceptance
        if: env.SIGNED_RELEASE == 'true'
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 2 -type d -name 'Acro dB Meter.app' -print -quit)"
          if [[ -z "$app_path" ]]; then
            echo "::error::Packaged macOS application was not found."
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate dist/*.dmg
          spctl --assess --type open --context context:primary-signature --verbose dist/*.dmg

      - name: Mark unsigned macOS artifacts
        if: env.SIGNED_RELEASE != 'true'
        shell: bash
        run: |
          for artifact in dist/*.dmg; do
            mv "$artifact" "${artifact%.*}-UNSIGNED.${artifact##*.}"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_title="Acro dB Meter $RELEASE_TAG"
          release_options=(--generate-notes)

          if [[ "$SIGNED_RELEASE" != "true" ]]; then
            release_title="$release_title (unsigned)"
            release_options+=(
              --prerelease
              --notes
              "⚠️ This pre-release is unsigned. Windows SmartScreen and macOS Gatekeeper may warn or block it. Verify SHA256SUMS.txt before use. No self-signed certificate was used."
            )
            printf '%s\n' \
              'UNSIGNED BUILD' \
              'These packages do not have a trusted publisher signature or Apple notarization.' \
              'Windows SmartScreen and macOS Gatekeeper may warn or block them.' \
              > release-assets/UNSIGNED-BUILD.txt
          fi

          (
            cd release-assets
            sha256sum -- * > SHA256SUMS.txt
          )

          common_arguments=(
            "$RELEASE_TAG"
            release-assets/*
            --repo "$GITHUB_REPOSITORY"
            --title "$release_title"
            "${release_options[@]}"
          )

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            gh release create "${common_arguments[@]}" --target "$GITHUB_SHA"
          else
            gh release create "${common_arguments[@]}" --verify-tag
          fi
