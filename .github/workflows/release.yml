name: Release desktop apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from package.json (for example: 1.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check tag matches package version
        shell: bash
        run: |
          expected_tag="v$(node -p "require('./package.json').version")"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version $expected_tag"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Manual releases must be run from the main branch."
            exit 1
          fi

  windows:
    name: Signed Windows build
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30
    environment: release-signing
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - name: Require Windows signing credentials
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD environment secrets are required."
          }

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build signed installers
        run: npm run dist -- --win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

  macos:
    name: Signed and notarized macOS build
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 45
    environment: release-signing
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Require Apple signing and notarization credentials
        shell: bash
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID)
          for variable in "${required[@]}"; do
            if [[ -z "${!variable}" ]]; then
              echo "::error::$variable is not configured. See README release instructions."
              exit 1
            fi
          done

      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build, sign, and notarize
        run: npm run dist -- --mac

      - name: Verify Gatekeeper acceptance
        shell: bash
        run: spctl --assess --type open --context context:primary-signature --verbose dist/*.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: "*"
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          common_arguments=(
            "$RELEASE_TAG"
            release-assets/*
            --repo "$GITHUB_REPOSITORY"
            --title "Acro dB Meter $RELEASE_TAG"
            --generate-notes
          )

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            gh release create "${common_arguments[@]}" --target "$GITHUB_SHA"
          else
            gh release create "${common_arguments[@]}" --verify-tag
          fi
